<app-section-wrapper title="Contact" lead="Discutons de vos enjeux stratégiques et de transformation.">
  <div class="contact-layout">
    <form [formGroup]="form" class="form">
      <ion-item><ion-label position="stacked">Nom</ion-label><ion-input formControlName="name"></ion-input></ion-item>
      <ion-item><ion-label position="stacked">Email</ion-label><ion-input type="email" formControlName="email"></ion-input></ion-item>
      <ion-item><ion-label position="stacked">Message</ion-label><ion-textarea rows="5" formControlName="message"></ion-textarea></ion-item>
      <ion-button expand="block" [disabled]="form.invalid">Envoyer la demande</ion-button>
    </form>
    <aside>
      <h3>Suivez-nous</h3>
      <p>LinkedIn · X · YouTube</p>
      <p>Paris · Tunis · Casablanca</p>
      <p>contact@expert-in.com</p>
    </aside>
  </div>
</app-section-wrapper>
